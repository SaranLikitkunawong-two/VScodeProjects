{% extends "base.html" %}
{% block title %}Scan Invoice – AccSoft{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-6">Scan Invoice</h1>

  <form method="POST" enctype="multipart/form-data"
        class="bg-white rounded-lg border border-gray-200 p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium mb-1">Invoice file
        <span class="text-gray-400 font-normal">(PDF, JPG, PNG)</span>
      </label>
      <input type="file" name="invoice" accept=".pdf,.jpg,.jpeg,.png" required
             class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4
                    file:rounded file:border-0 file:bg-blue-50 file:text-blue-700
                    hover:file:bg-blue-100 border border-gray-300 rounded" />
    </div>

    <p class="text-xs text-gray-500">
      Digital PDFs are extracted automatically. Scanned images require manual field entry after upload.
    </p>

    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded">
      Upload &amp; Extract
    </button>
  </form>
</div>
{% endblock %}
