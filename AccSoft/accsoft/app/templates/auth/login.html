{% extends "base.html" %}
{% block title %}Login — AccSoft{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-bold mb-6 text-center">AccSoft</h1>
  <div class="bg-white rounded-lg shadow p-8">
    <h2 class="text-lg font-semibold mb-4">Sign in</h2>
    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1" for="email">Email</label>
        <input
          id="email" name="email" type="email" autocomplete="email"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium mb-1" for="password">Password</label>
        <input
          id="password" name="password" type="password" autocomplete="current-password"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded text-sm transition-colors"
      >
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
