{% extends "base.html" %}
{% block title %}New Reconciliation Session — AccSoft{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="{{ url_for('reconciliation.list_sessions') }}"
     class="text-sm text-gray-500 hover:text-blue-600">&larr; Back to sessions</a>
  <h1 class="text-2xl font-semibold mt-2">New Reconciliation Session</h1>
</div>

<div class="bg-white border border-gray-200 rounded p-6 max-w-2xl">
  <form method="POST" enctype="multipart/form-data" class="space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Bank Account</label>
      <select name="account_id" required
              class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
        <option value="">— select account —</option>
        {% for acct in accounts %}
        <option value="{{ acct.id }}"
          {% if prefill.get('account_id') == acct.id %}selected{% endif %}>
          {{ acct.code }} — {{ acct.name }} ({{ acct.type }})
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Period Start</label>
        <input type="date" name="period_start" required
               value="{{ prefill.get('period_start', '') }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Period End</label>
        <input type="date" name="period_end" required
               value="{{ prefill.get('period_end', '') }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Opening Balance</label>
        <input type="number" name="opening_balance" step="0.01" placeholder="0.00"
               value="{{ prefill.get('opening_balance', '0') }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Statement Date <span class="text-gray-400">(optional)</span></label>
        <input type="date" name="statement_date"
               value="{{ prefill.get('statement_date', '') }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Bank Statement CSV</label>
      <input type="file" name="csv_file" accept=".csv" required
             class="w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-sm file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      <p class="text-xs text-gray-400 mt-1">
        Required columns: <code>date</code>, <code>description</code>, <code>amount</code>.
        Optional: <code>reference</code>, <code>balance</code>, <code>external_id</code>.
      </p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400">(optional)</span></label>
      <textarea name="notes" rows="2"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">{{ prefill.get('notes', '') }}</textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-blue-600 text-white text-sm px-5 py-2 rounded hover:bg-blue-700">
        Import &amp; Create Session
      </button>
      <a href="{{ url_for('reconciliation.list_sessions') }}"
         class="text-sm px-4 py-2 rounded border border-gray-300 text-gray-600 hover:bg-gray-50">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
