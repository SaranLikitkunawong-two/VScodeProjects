<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview — Welcome Home Baby!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Celebration triggers immediately on this preview page -->
  <div id="celebration" class="active">
    <canvas id="fw-canvas"></canvas>

    <div id="plane-row">
      <div class="banner-strip">Welcome Home Baby</div>
      <svg class="rope-svg" width="120" height="26" viewBox="0 0 120 26" aria-hidden="true">
        <path d="M 0 5 Q 60 22 120 5"
              stroke="rgba(255,255,255,0.72)" stroke-width="2.5"
              fill="none" stroke-linecap="round"/>
      </svg>
      <span class="plane-cel">✈</span>
    </div>

    <div id="welcome-msg">
      <h1>Welcome Home Baby!</h1>
      <p>Saran &amp; Christine, reunited at last ♡</p>
    </div>
  </div>

  <script>
    function startFireworks() {
      const canvas = document.getElementById('fw-canvas');
      const ctx    = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = 'rgba(7, 3, 20, 1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      resize();
      window.addEventListener('resize', resize);

      const COLORS = [
        '#FF6EB4', '#FFD700', '#FF4500', '#00CFFF',
        '#98FB98', '#FFA0C8', '#FFA500', '#C8A0FF'
      ];

      class Spark {
        constructor(x, y) {
          const angle  = Math.random() * Math.PI * 2;
          const spd    = 1.5 + Math.random() * 5.5;
          this.x       = x;
          this.y       = y;
          this.color   = COLORS[Math.floor(Math.random() * COLORS.length)];
          this.vx      = Math.cos(angle) * spd;
          this.vy      = Math.sin(angle) * spd;
          this.alpha   = 1;
          this.decay   = 0.011 + Math.random() * 0.015;
          this.r       = 1.5 + Math.random() * 2.5;
        }
        tick() {
          this.x     += this.vx;
          this.y     += this.vy;
          this.vy    += 0.07;
          this.vx    *= 0.97;
          this.vy    *= 0.97;
          this.alpha -= this.decay;
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = Math.max(0, this.alpha);
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
          ctx.restore();
        }
      }

      class Shell {
        constructor() {
          this.x       = canvas.width * 0.1 + Math.random() * canvas.width * 0.8;
          this.y       = canvas.height;
          this.vy      = -(9 + Math.random() * 8);
          this.targetY = canvas.height * (0.08 + Math.random() * 0.42);
          this.color   = COLORS[Math.floor(Math.random() * COLORS.length)];
          this.trail   = [];
          this.done    = false;
        }
        tick(sparks) {
          this.trail.push([this.x, this.y]);
          if (this.trail.length > 10) this.trail.shift();
          this.y  += this.vy;
          this.vy += 0.22;
          if (this.y <= this.targetY || this.vy >= 0) {
            const n = 80 + Math.floor(Math.random() * 70);
            for (let i = 0; i < n; i++) sparks.push(new Spark(this.x, this.y));
            this.done = true;
          }
        }
        draw() {
          ctx.save();
          for (let i = 0; i < this.trail.length; i++) {
            const [tx, ty] = this.trail[i];
            ctx.globalAlpha = (i / this.trail.length) * 0.65;
            ctx.beginPath();
            ctx.arc(tx, ty, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
          }
          ctx.restore();
        }
      }

      const sparks = [];
      const shells = [];
      let lastLaunch = 0;

      function loop(ts) {
        ctx.fillStyle = 'rgba(7, 3, 20, 0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (ts - lastLaunch > 500 + Math.random() * 700) {
          shells.push(new Shell());
          if (Math.random() < 0.4) shells.push(new Shell());
          lastLaunch = ts;
        }

        for (let i = shells.length - 1; i >= 0; i--) {
          shells[i].tick(sparks);
          shells[i].draw();
          if (shells[i].done) shells.splice(i, 1);
        }
        for (let i = sparks.length - 1; i >= 0; i--) {
          sparks[i].tick();
          sparks[i].draw();
          if (sparks[i].alpha <= 0) sparks.splice(i, 1);
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    }

    startFireworks();
  </script>
</body>
</html>
